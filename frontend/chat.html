<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body data-page="chat">
  <main class="chat-shell">
    <section class="chat-app">
      <header class="chat-header">
        <div class="chat-heading">
          <p class="eyebrow">CSC410 Assignment 5</p>
          <h1>Prompt the vLLM Model</h1>
          <p class="chat-subtitle">Previous messages stay in context so you can continue the same conversation naturally.</p>
        </div>

        <div class="chat-header-side">
          <div class="chat-header-actions">
          <div class="session-card">
            <p class="session-label">Logged in as</p>
            <p id="user-email" class="user-email">Loading account...</p>
          </div>
          <button id="logout-button" class="ghost-button" type="button">Log out</button>
          </div>
        </div>
      </header>

      <section id="chat-messages" class="chat-messages" aria-live="polite"></section>

      <form id="chat-form" class="chat-form">
        <label class="sr-only" for="prompt">Prompt</label>
        <textarea id="prompt" name="prompt" rows="3" placeholder="Ask something specific, refine a previous answer, or continue the thread..." required></textarea>
        <div class="chat-form-footer">
          <div class="chat-form-meta">
            <p id="chat-status" class="status" aria-live="polite"></p>
            <p class="chat-hint">Enter to send. Shift+Enter for a new line.</p>
          </div>
          <button id="send-button" type="submit">Send</button>
        </div>
      </form>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
