<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body data-page="register">
  <main class="auth-shell">
    <section class="auth-panel">
      <p class="eyebrow">CSC410 Assignment 5</p>
      <h1>Create your account</h1>
      <p class="intro">Register with an email and password. This page submits directly to the FastAPI backend.</p>

      <form id="auth-form" class="auth-form">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="name@example.com" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Choose a password" required>

        <label for="confirmationPassword">Confirm Password</label>
        <input id="confirmationPassword" name="confirmationPassword" type="password" placeholder="Retype your password" required>

        <button type="submit">Register</button>
      </form>

      <p id="status" class="status" aria-live="polite"></p>
      <p class="switch-link">Already have an account? <a href="./index.html">Log in</a></p>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
