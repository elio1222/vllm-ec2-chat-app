<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body data-page="index">
  <main class="auth-shell">
    <section class="auth-panel">
      <p class="eyebrow">CSC410 Assignment 5</p>
      <h1>Welcome back</h1>
      <p class="intro">Log in with the credentials you registered. Successful login depends on the backend setting the session cookie.</p>

      <form id="auth-form" class="auth-form">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="name@example.com" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Enter your password" required>

        <button type="submit">Log in</button>
      </form>

      <p id="status" class="status" aria-live="polite"></p>
      <p class="switch-link">Need an account? <a href="./register.html">Create one</a></p>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
